services:
  whisperx-asr:
    # Use prebuilt image from Docker Hub
    image: learnedmachine/whisperx-asr-service:latest

    container_name: whisperx-asr-api
    restart: unless-stopped

    # GPU configuration
    # To use all GPUs, use 'count: all'
    # To use specific GPU(s), use 'device_ids: ["0"]' or 'device_ids: ["0", "1"]'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "9000:9000"
      - "${RAY_DASHBOARD_PORT:-8265}:8265"  # Ray dashboard (only used in ray mode)

    # Ray uses /dev/shm for object store
    shm_size: '2g'

    environment:
      # All values loaded from .env file
      - DEVICE=${DEVICE:-cuda}
      - COMPUTE_TYPE=${COMPUTE_TYPE:-float16}
      - BATCH_SIZE=${BATCH_SIZE:-16}
      - HF_TOKEN=${HF_TOKEN}
      - CACHE_DIR=${CACHE_DIR:-/.cache}
      - HF_HOME=${CACHE_DIR:-/.cache}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-}
      - NLTK_DATA=/.cache/nltk_data
      - PRELOAD_MODEL=${PRELOAD_MODEL:-}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-1000}
      # Serve mode: simple (uvicorn) or ray (Ray Serve)
      - SERVE_MODE=${SERVE_MODE:-simple}
      # Ray Serve batching config
      - WHISPER_BATCH_SIZE=${WHISPER_BATCH_SIZE:-4}
      - ALIGN_BATCH_SIZE=${ALIGN_BATCH_SIZE:-8}
      - DIARIZE_BATCH_SIZE=${DIARIZE_BATCH_SIZE:-2}
      - BATCH_WAIT_TIMEOUT=${BATCH_WAIT_TIMEOUT:-0.1}
      # GPU concurrency for simple mode queue
      - GPU_CONCURRENCY=${GPU_CONCURRENCY:-1}

    volumes:
      # Persistent cache for models (recommended)
      - whisperx-cache:/.cache

    healthcheck:
      test: ["CMD", "python3", "-c", "import requests; requests.get('http://localhost:9000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  whisperx-cache:
    driver: local
